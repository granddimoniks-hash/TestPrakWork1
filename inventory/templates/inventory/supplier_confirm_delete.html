{% extends "inventory/base.html" %}
{% block title %}Удаление поставщика{% endblock %}
{% block content %}
<h1>Удаление поставщика</h1>
<p>Вы уверены, что хотите удалить «{{ object.name }}»?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'supplier_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
