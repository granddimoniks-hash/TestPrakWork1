<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Учёт оборудования{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        nav { background: #333; padding: 10px 20px; }
        nav a { color: white; text-decoration: none; margin-right: 15px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 8px 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #f0f0f0; }
        .btn { display: inline-block; padding: 6px 14px; background: #007bff; color: white;
               text-decoration: none; border: none; cursor: pointer; margin-right: 5px; }
        .btn-danger { background: #dc3545; }
        .btn-secondary { background: #6c757d; }
        form.inline { display: inline; }
        input[type="text"], select, textarea { padding: 6px; margin: 4px 0; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; max-width: 400px; }
        .errorlist { color: red; list-style: none; padding: 0; }
        .search-form { margin-bottom: 15px; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'equipment_list' %}">Оборудование</a>
        <a href="{% url 'supplier_list' %}">Поставщики</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
